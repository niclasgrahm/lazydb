[book]
title = "lazydb"
description = "Terminal UI database client — user documentation"
authors = ["lazydb contributors"]
language = "en"

[rust]
edition = "2024"

[output.html]
theme = "theme"
default-theme = "light"
preferred-dark-theme = "navy"
smart-punctuation = true
mathjax-support = false

[output.html.fold]
enable = true
level = 2

[output.html.print]
page-break = true

[output.html.search]
limit-results = 30
